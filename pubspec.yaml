name: seedling
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  
  # Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  
  # Notifications
  flutter_local_notifications: ^17.2.2
  
  # UI/Charts
  fl_chart: ^0.66.0
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  get_it: ^7.7.0
  
  # Audio
  just_audio: ^0.9.36

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/audio/
    - assets/backgrounds/
